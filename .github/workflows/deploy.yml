name: V7 Validate, Gate & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 21 * * 0'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      passed:   ${{ steps.gate.outputs.passed || 'false' }}
      accuracy: ${{ steps.gate.outputs.accuracy || '0.0' }}
      log_loss: ${{ steps.gate.outputs.log_loss || '99.0' }}
      failure_reason: ${{ steps.gate.outputs.failure_reason || 'pipeline_error' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify training data exists
        run: |
          echo "=== Checking training data ==="
          if [ -f "data/international_results.csv" ]; then
            ROWS=$(wc -l < data/international_results.csv)
            SIZE=$(stat --format=%s data/international_results.csv 2>/dev/null || stat -f%z data/international_results.csv 2>/dev/null || echo "unknown")
            echo "✅ international_results.csv: $ROWS rows, $SIZE bytes"
            # Check it's not an LFS pointer (those are <200 bytes)
            if [ "$SIZE" != "unknown" ] && [ "$SIZE" -lt 1000 ]; then
              echo "⚠️  File looks like an LFS pointer (too small). Pulling LFS..."
              git lfs pull
              SIZE=$(stat --format=%s data/international_results.csv 2>/dev/null || stat -f%z data/international_results.csv 2>/dev/null || echo "unknown")
              echo "After LFS pull: $SIZE bytes"
            fi
          else
            echo "⚠️  international_results.csv not found — will use mock data"
          fi

      - name: Run train_test.py
        id: train
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        continue-on-error: true
        run: python train_test.py 2>&1 | tee validation_output.txt

      - name: Evaluate accuracy + log-loss gates
        id: gate
        if: always()
        run: |
          python - <<'PYEOF'
          import re, sys, os

          try:
              with open('validation_output.txt') as f:
                  txt = f.read()
          except FileNotFoundError:
              txt = ""

          if not txt.strip():
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write("passed=false\n")
                  f.write("accuracy=0.0\n")
                  f.write("log_loss=99.0\n")
                  f.write("failure_reason=pipeline_crash_no_output\n")
              print("❌ GATE FAILED: train_test.py produced no output (crashed)")
              sys.exit(0)

          acc_m = re.search(r'[Aa]ccuracy[:\s]+(\d+\.?\d*)%', txt)
          ll_m  = re.search(r'[Ll]og.?[Ll]oss[:\s]+([\d.]+)', txt)

          acc = float(acc_m.group(1)) if acc_m else 0.0
          ll  = float(ll_m.group(1))  if ll_m  else 99.0

          ACC_GATE = 43.0
          LL_GATE  = 1.11
          passed   = acc >= ACC_GATE and ll <= LL_GATE
          reason   = "gates_passed" if passed else f"acc={acc:.1f}_ll={ll:.4f}"

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"accuracy={acc:.2f}\n")
              f.write(f"log_loss={ll:.4f}\n")
              f.write(f"passed={'true' if passed else 'false'}\n")
              f.write(f"failure_reason={reason}\n")

          print(f"Accuracy: {acc:.2f}% | Log-Loss: {ll:.4f}")
          print(f"Result: {'✅ PASS' if passed else '❌ FAIL'}")
          PYEOF

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-${{ github.run_number }}
          path: validation_output.txt
          retention-days: 30

  deploy:
    needs: validate
    if: needs.validate.outputs.passed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deployment
        run: |
          echo "✅ Deploying: Accuracy=${{ needs.validate.outputs.accuracy }}% LL=${{ needs.validate.outputs.log_loss }}"

  notify-failure:
    needs: validate
    if: |
      always() && needs.validate.outputs.passed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report failure
        run: |
          echo "⚠️ Validation did not pass."
          echo "Accuracy: ${{ needs.validate.outputs.accuracy }}"
          echo "Log-Loss: ${{ needs.validate.outputs.log_loss }}"
          echo "Reason:   ${{ needs.validate.outputs.failure_reason }}"
          echo ""
          echo "No rollback performed — manual review recommended."
          echo "Check the validation artifact for full output."
