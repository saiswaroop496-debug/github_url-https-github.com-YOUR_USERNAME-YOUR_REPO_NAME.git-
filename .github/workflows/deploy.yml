name: V7 Validate, Gate & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 21 * * 0'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      passed:   ${{ steps.gate.outputs.passed }}
      accuracy: ${{ steps.gate.outputs.accuracy }}
      log_loss: ${{ steps.gate.outputs.log_loss }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Verify training data exists
        run: |
          echo "Checking critical data files..."
          if [ ! -f "data/international_results.csv" ]; then
            echo "::error::data/international_results.csv is MISSING. Force-add it with: git add -f data/international_results.csv"
            exit 1
          fi
          wc -l data/international_results.csv
          echo "Training data OK."
      - name: Run train_test.py
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python train_test.py --auto-deploy=false 2>&1 | tee validation_output.txt
      - name: Evaluate gates
        id: gate
        if: always()
        run: |
          python - <<'PYEOF'
          import re, sys, os
          try:
              with open('validation_output.txt') as f: txt = f.read()
          except FileNotFoundError:
              txt = ""
          acc_m = re.search(r'[Aa]ccuracy[:\s]+(\d+\.?\d*)%', txt)
          ll_m  = re.search(r'[Ll]og.?[Ll]oss[:\s]+([\d.]+)', txt)
          acc = float(acc_m.group(1)) if acc_m else 0.0
          ll  = float(ll_m.group(1))  if ll_m  else 99.0
          ACC_GATE = 43.0
          LL_GATE  = 1.10
          passed = (acc >= ACC_GATE and ll <= LL_GATE)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"accuracy={acc:.2f}\n")
              f.write(f"log_loss={ll:.4f}\n")
              f.write(f"passed={'true' if passed else 'false'}\n")
          print(f"Gate result: accuracy={acc:.2f}%, log_loss={ll:.4f}, passed={passed}")
          if not passed:
              print(f"::warning::Quality gate FAILED — Accuracy: {acc:.2f}% (need ≥{ACC_GATE}%), Log-Loss: {ll:.4f} (need ≤{LL_GATE})")
              sys.exit(1)
          PYEOF
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-${{ github.run_number }}
          path: validation_output.txt
          retention-days: 30
  rollback:
    needs: validate
    if: always() && needs.validate.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Rollback main
        run: |
          git config user.name "CI Rollback Bot"
          git config user.email "ci@worldcup-engine"
          git revert HEAD --no-edit || echo "Revert failed, may need manual intervention"
          git push origin main || echo "Push failed, check permissions"
      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          ACC="${{ needs.validate.outputs.accuracy }}"
          LL="${{ needs.validate.outputs.log_loss }}"
          MSG="🔴 *V7 CI FAILURE*%0AAccuracy: ${ACC:-N/A}%25 (gate: 43.0%25)%0ALog-Loss: ${LL:-N/A} (gate: 1.10)%0AAuto-rollback executed. Last good model restored."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -d "chat_id=${TELEGRAM_CHANNEL_ID}" -d "text=${MSG}" -d "parse_mode=Markdown" || echo "Telegram notify failed"
  deploy:
    needs: validate
    if: needs.validate.outputs.passed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deployment
        run: echo "✅ Streamlit Cloud redeploys automatically on push to main."
